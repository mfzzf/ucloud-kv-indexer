{{- if .Values.persistentVolume.create }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.persistentVolume.name }}
  labels:
{{ include "ucloud-kv-mongodb.labels" . | indent 4 }}
spec:
  capacity:
    storage: {{ .Values.persistentVolume.storage }}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ .Values.storageClass.name }}
  local:
    path: {{ .Values.persistentVolume.localPath }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - {{ required "persistentVolume.nodeName is required" .Values.persistentVolume.nodeName }}
{{- end }}
