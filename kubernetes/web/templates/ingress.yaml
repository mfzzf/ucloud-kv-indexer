{{- if .Values.web.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ucloud-kv-web.name" . }}
  namespace: {{ include "ucloud-kv-web.namespace" . }}
  labels:
{{ include "ucloud-kv-web.labels" . | indent 4 }}
{{- with .Values.web.ingress.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
{{- if .Values.web.ingress.className }}
  ingressClassName: {{ .Values.web.ingress.className }}
{{- end }}
{{- with .Values.web.ingress.tls }}
  tls:
{{ toYaml . | indent 4 }}
{{- end }}
  rules:
{{- range .Values.web.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
{{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "ucloud-kv-web.name" $ }}
                port:
                  name: http
{{- end }}
{{- end }}
{{- end }}
