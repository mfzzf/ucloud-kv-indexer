apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ucloud-kv-web.name" . }}
  namespace: {{ include "ucloud-kv-web.namespace" . }}
  labels:
{{ include "ucloud-kv-web.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ucloud-kv-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ucloud-kv-web
        app.kubernetes.io/part-of: ucloud-kv-indexer
    spec:
{{- with .Values.web.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.web.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.web.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: web
          image: {{ include "ucloud-kv-web.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          env:
            - name: PORT
              value: {{ .Values.web.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: KVI_API_BASE
              value: {{ required "web.gatewayBaseURL is required" .Values.web.gatewayBaseURL | quote }}
            - name: NEXT_PUBLIC_API_BASE
              value: "/api/kvi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
{{- with .Values.web.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
