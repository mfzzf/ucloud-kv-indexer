namespace:
  create: true
  name: ucloud-kv-indexers

image:
  repository: uhub.service.ucloud.cn/uminfer/ucloud-kv-indexer
  tag: latest
  pullPolicy: IfNotPresent

secrets:
  create: true
  name: kvindexer-secrets
  backendToken: 70982fdbbb8dc83145eda4b7fb99e55b0be74c0682c4f09c0b406112c10ae002

bootstrap:
  enabled: true
  configMapName: kvindexer-bootstrap
  files:
    cn-shanghai-vllm.yaml: |
      clusters:
        - cluster_id: cn-shanghai-vllm
          display_name: cn-shanghai vLLM Qwen3.5-4B
          region: cn-shanghai
          environment: prod
          enabled: true
          framework: vllm
          backends:
            - http://kvindexer-vllm-cn-shanghai.internal.example.com:8090
          models:
            - model_id: qwen3.5-4b
              block_size: 528
              hash_seed: "0"
              tokenizer_endpoint: http://vllm.cn-shanghai.svc.cluster.local:8000
          engines:
            - engine_id: vllm-cn-shanghai-0
              api_endpoint: http://vllm.cn-shanghai.svc.cluster.local:8000
              tokenizer_endpoint: http://vllm.cn-shanghai.svc.cluster.local:8000
              kv_event_endpoint: tcp://vllm.cn-shanghai.svc.cluster.local:5559
              replay_endpoint: tcp://vllm.cn-shanghai.svc.cluster.local:5560
              topic: kv-events
              served_models: [qwen3.5-4b]
              dp_ranks: 1
              max_model_len: 65536
    cn-guangzhou-sglang.yaml: |
      clusters:
        - cluster_id: cn-guangzhou-sglang
          display_name: cn-guangzhou SGLang Qwen3-0.6B
          region: cn-guangzhou
          environment: prod
          enabled: true
          framework: sglang
          backends:
            - http://kvindexer-sglang-cn-guangzhou.internal.example.com:8090
          models:
            - model_id: qwen3-0.6b
              block_size: 64
              hash_seed: "0"
              tokenizer_endpoint: http://sglang.cn-guangzhou.svc.cluster.local:30000
          engines:
            - engine_id: sglang-cn-guangzhou-0
              api_endpoint: http://sglang.cn-guangzhou.svc.cluster.local:30000
              tokenizer_endpoint: http://sglang.cn-guangzhou.svc.cluster.local:30000
              kv_event_endpoint: tcp://sglang.cn-guangzhou.svc.cluster.local:5557
              replay_endpoint: tcp://sglang.cn-guangzhou.svc.cluster.local:5558
              topic: kv-events
              served_models: [qwen3-0.6b]
              dp_ranks: 1
              max_model_len: 8192

indexers:
  - name: kvindexer-vllm-cn-shanghai
    enabled: true
    region: cn-shanghai
    clusterID: cn-shanghai-vllm
    replicas: 1
    listenAddress: ":8090"
    port: 8090
    store: mongo
    bootstrapFile: cn-shanghai-vllm.yaml
    service:
      type: ClusterIP
    mongo:
      uri: mongodb://kvindexer:084cd20669f55b340cddd0357d80c42fec78673db51cf622bf8c6b531d95c126@mongodb-cn-shanghai.example.com:27017/?authSource=admin
      db: kvindexer_cn_shanghai_vllm
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
  - name: kvindexer-sglang-cn-guangzhou
    enabled: true
    region: cn-guangzhou
    clusterID: cn-guangzhou-sglang
    replicas: 1
    listenAddress: ":8090"
    port: 8090
    store: mongo
    bootstrapFile: cn-guangzhou-sglang.yaml
    service:
      type: ClusterIP
    mongo:
      uri: mongodb://kvindexer:1f81067287da95635fe20b5336edc4b84ec7d444f9a4092ccee854518401584f@mongodb-cn-guangzhou.example.com:27017/?authSource=admin
      db: kvindexer_cn_guangzhou_sglang
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
