image:
  repository: uhub.service.ucloud.cn/uminfer-proxy/ucloud-kv-indexer
  tag: latest
  pullPolicy: Always

bootstrap:
  files:
    th-gb200.yaml: |
      clusters:
        - cluster_id: th-gb200
          display_name: TH GB200 SGLang DeepSeek-V4-Pro
          region: th
          environment: prod
          enabled: true
          framework: sglang
          backends:
            - http://kvindexer-th-gb200.ucloud-kv-indexers.svc.cluster.local:8090
          models:
            - model_id: "/mnt/nvme4n1/models/deepseek-ai/DeepSeek-V4-Pro"
              block_size: 256
              hash_seed: "0"
              tokenizer_endpoint: http://sglang-deepseek-v4-pro.default.svc.cluster.local:30000/v1/tokenize
          engines:
            - engine_id: sglang-deepseek-v4-pro
              api_endpoint: http://sglang-deepseek-v4-pro.default.svc.cluster.local:30000
              tokenizer_endpoint: http://sglang-deepseek-v4-pro.default.svc.cluster.local:30000/v1/tokenize
              kv_event_endpoint: tcp://sglang-deepseek-v4-pro.default.svc.cluster.local:5557
              replay_endpoint: tcp://sglang-deepseek-v4-pro.default.svc.cluster.local:5565
              topic: kv-events
              served_models:
                - "/mnt/nvme4n1/models/deepseek-ai/DeepSeek-V4-Pro"
              dp_ranks: 8
              max_model_len: 1048576

indexers:
  - name: kvindexer-th-gb200
    enabled: true
    region: th
    clusterID: th-gb200
    replicas: 1
    listenAddress: ":8090"
    port: 8090
    store: mongo
    bootstrapFile: th-gb200.yaml
    tokenizerDebug: false
    extraEnv: []
    service:
      type: ClusterIP
    mongo:
      uri: mongodb://admin:rBiuxsNI9pcdsEa6GN9t5XG0vWdi7SPxwA1XcrPo@mongodb.mongodb.svc.cluster.local:27017/?authSource=admin
      db: kvindexer_th_gb200
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
