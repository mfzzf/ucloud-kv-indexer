{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ucloud-kv-indexer.secretName" . }}
  namespace: {{ include "ucloud-kv-indexer.namespace" . }}
  labels:
    helm.sh/chart: {{ include "ucloud-kv-indexer.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: ucloud-kv-indexer
type: Opaque
stringData:
  backend-token: {{ required "secrets.backendToken is required" .Values.secrets.backendToken | quote }}
{{- range .Values.indexers }}
{{- if .enabled }}
{{- if eq .store "mongo" }}
  {{ .name }}-mongo-uri: {{ required (printf "indexers[%s].mongo.uri is required" .name) .mongo.uri | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
