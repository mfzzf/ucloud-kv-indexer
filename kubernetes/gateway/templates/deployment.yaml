apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ucloud-kv-gateway.name" . }}
  namespace: {{ include "ucloud-kv-gateway.namespace" . }}
  labels:
{{ include "ucloud-kv-gateway.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kvgateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kvgateway
        app.kubernetes.io/part-of: ucloud-kv-indexer
    spec:
{{- with .Values.gateway.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.gateway.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.gateway.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
      containers:
        - name: kvgateway
          image: {{ include "ucloud-kv-gateway.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/kvgateway"]
          args:
            - -addr={{ .Values.gateway.listenAddress }}
            - -store={{ .Values.gateway.store }}
            - -mongo-db={{ .Values.gateway.mongo.db }}
{{- if .Values.localTokenizer.enabled }}
            - -local-tokenizer-url={{ .Values.localTokenizer.url }}
{{- end }}
{{- if and .Values.bootstrap.enabled .Values.gateway.configFiles }}
{{- $paths := list }}
{{- range .Values.gateway.configFiles }}
{{- $paths = append $paths (printf "/etc/kvindexer/bootstrap/%s" .) }}
{{- end }}
            - -configs={{ join "," $paths }}
{{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          env:
            - name: KVGATEWAY_BACKEND_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ucloud-kv-gateway.secretName" . }}
                  key: backend-token
            - name: KVGATEWAY_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "ucloud-kv-gateway.secretName" . }}
                  key: mongo-uri
            - name: KVGATEWAY_MONGO_DB
              value: {{ .Values.gateway.mongo.db | quote }}
{{- if .Values.localTokenizer.enabled }}
            - name: KVGATEWAY_LOCAL_TOKENIZER_URL
              value: {{ .Values.localTokenizer.url | quote }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
{{- with .Values.gateway.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
{{- if .Values.bootstrap.enabled }}
          volumeMounts:
            - name: bootstrap
              mountPath: /etc/kvindexer/bootstrap
              readOnly: true
{{- end }}
{{- if .Values.localTokenizer.enabled }}
        - name: local-tokenizer
          image: "{{ .Values.localTokenizer.image.repository }}:{{ .Values.localTokenizer.image.tag }}"
          imagePullPolicy: {{ .Values.localTokenizer.image.pullPolicy }}
          ports:
            - name: tokenizer
              containerPort: {{ .Values.localTokenizer.port }}
          env:
            - name: TOKENIZER_ROOT
              value: {{ .Values.localTokenizer.tokenizersRoot | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: tokenizer
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: tokenizer
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: local-tokenizers
              mountPath: {{ .Values.localTokenizer.tokenizersRoot | quote }}
{{- with .Values.localTokenizer.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
{{- end }}
{{- if or .Values.bootstrap.enabled .Values.localTokenizer.enabled }}
      volumes:
{{- if .Values.bootstrap.enabled }}
        - name: bootstrap
          configMap:
            name: {{ include "ucloud-kv-gateway.bootstrapName" . }}
{{- end }}
{{- if .Values.localTokenizer.enabled }}
        - name: local-tokenizers
{{- if .Values.localTokenizer.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.localTokenizer.persistence.existingClaim | quote }}
{{- else }}
          emptyDir: {}
{{- end }}
{{- end }}
{{- end }}
