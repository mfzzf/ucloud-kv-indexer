{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ucloud-kv-gateway.secretName" . }}
  namespace: {{ include "ucloud-kv-gateway.namespace" . }}
  labels:
{{ include "ucloud-kv-gateway.labels" . | indent 4 }}
type: Opaque
stringData:
  backend-token: {{ required "secrets.backendToken is required" .Values.secrets.backendToken | quote }}
  mongo-uri: {{ required "secrets.mongoURI is required; gateway stores registry/assets in MongoDB" .Values.secrets.mongoURI | quote }}
{{- end }}
