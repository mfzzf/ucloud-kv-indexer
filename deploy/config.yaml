# ucloud-kv-indexer — single-file topology config (nested style).
#
# One config.yaml describes the WHOLE deployment. Each CLUSTER is a
# (GPU pool + serving framework + model) unit, and configures everything it
# owns — its engines and models are written UNDER it. Engines/models inherit the
# cluster's `framework`; models get a default hash_profile of
# "<framework>-v1-text". The loader flattens this into normalized
# clusters/engines/profiles tables (one SQLite table each).
#
# Two programs read THIS SAME FILE:
#
#   kvgateway  -config deploy/config.yaml
#       Builds its federated backend list from each cluster's `backends`. The web
#       console talks only to the gateway and selects a cluster with ?cluster=.
#
#   kvindexer  -bootstrap deploy/config.yaml -cluster h20-1 -store sqlite
#       Runs next to one cluster's engines (so the ZMQ KV-event stream stays
#       local), seeded ONCE from this file scoped to -cluster. After first boot
#       the SQLite store is the source of truth and the console mutates it.
#       Omit -cluster to run one process fronting every cluster over TCP.

clusters:
  - cluster_id: h20-1
    display_name: H20 Pool #1 — SGLang Qwen3
    environment: prod
    enabled: true
    framework: sglang
    backends: [http://10.0.0.1:8090]      # kvindexer URL(s) the gateway federates
    models:
      # hybrid-Mamba => page_size 1; hash_profile defaults to sglang-v1-text.
      - model_id: qwen3
        block_size: 1
        hash_seed: "0"
        tokenizer_endpoint: http://10.0.0.1:30000
    engines:
      - engine_id: sglang-h20-1-0
        api_endpoint: http://10.0.0.1:30000
        tokenizer_endpoint: http://10.0.0.1:30000
        kv_event_endpoint: tcp://10.0.0.1:5557
        replay_endpoint: tcp://10.0.0.1:5558
        topic: kv-events
        served_models: [qwen3]
        dp_ranks: 1
        max_model_len: 32768

  - cluster_id: h20-2
    display_name: H20 Pool #2 — vLLM Qwen2.5
    environment: prod
    enabled: true
    framework: vllm
    backends: [http://10.0.1.1:8090]
    models:
      # standard attention => paged block_size; hash_profile => vllm-v1-text.
      - model_id: qwen2.5
        block_size: 16
        hash_seed: "0"
        tokenizer_endpoint: http://10.0.1.1:8000
    engines:
      - engine_id: vllm-h20-2-0
        api_endpoint: http://10.0.1.1:8000
        tokenizer_endpoint: http://10.0.1.1:8000
        kv_event_endpoint: tcp://10.0.1.1:5557
        replay_endpoint: tcp://10.0.1.1:5558
        topic: kv-events
        served_models: [qwen2.5]
        dp_ranks: 1
        max_model_len: 32768

  - cluster_id: h200-1
    display_name: H200 Pool #1 — SGLang Qwen3.6
    environment: prod
    enabled: true
    framework: sglang
    backends: [http://10.0.2.1:8090]
    models:
      - model_id: qwen3.6
        block_size: 1
        hash_seed: "0"
        tokenizer_endpoint: http://10.0.2.1:30000
    engines:
      - engine_id: sglang-h200-1-0
        api_endpoint: http://10.0.2.1:30000
        tokenizer_endpoint: http://10.0.2.1:30000
        kv_event_endpoint: tcp://10.0.2.1:5557
        replay_endpoint: tcp://10.0.2.1:5558
        topic: kv-events
        served_models: [qwen3.6]
        dp_ranks: 1
        max_model_len: 65536

# Policies are cross-cluster (scoped by cluster/model/tenant), so they stay at
# the top level rather than nested under a single cluster.
policies:
  - policy_id: global-default
    long_prompt_threshold_tokens: 4096
    hard_long_prompt_threshold_tokens: 32768
    min_hit_ratio_for_long_prompt: 0.5
    event_freshness_ttl_ms: 5000
    enabled: true

  - policy_id: qwen3.6-long
    scope_model_id: qwen3.6
    long_prompt_threshold_tokens: 8192
    hard_long_prompt_threshold_tokens: 60000
    min_hit_ratio_for_long_prompt: 0.6
    enabled: true
