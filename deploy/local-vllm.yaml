# Local vLLM cluster config. This file is loaded only by the local-vllm
# kvindexer; the gateway reads it only to discover this cluster's backend URL.
clusters:
  - cluster_id: local-vllm
    display_name: Local · vLLM · Qwen3.5-4B
    region: localhost
    environment: dev
    enabled: true
    framework: vllm
    backends: [http://127.0.0.1:8090]
    models:
      - model_id: qwen3.5-4b
        block_size: 528
        hash_seed: "0"
        tokenizer_endpoint: http://127.0.0.1:8000
    engines:
      - engine_id: vllm-local-0
        api_endpoint: http://127.0.0.1:8000
        tokenizer_endpoint: http://127.0.0.1:8000
        kv_event_endpoint: tcp://127.0.0.1:5559
        replay_endpoint: tcp://127.0.0.1:5560
        topic: kv-events
        served_models: [qwen3.5-4b]
        dp_ranks: 1
        max_model_len: 65536

policies:
  - rule_id: local-vllm-cache-gate
    name: 256 Token 以上要求 KV 命中
    priority: 100
    conditions:
      - field: cluster_id
        op: eq
        value: local-vllm
      - field: input_tokens
        op: gte
        value: 256
    action:
      type: require_cache_hit
      min_hit_ratio: 0.5
      on_low_hit: reject
      on_uncertain: fallback_accept
      reject_status: 429
    enabled: true
